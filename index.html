<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Image Gallery</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <header>
      <h1>Creative Image Gallery</h1>
      <p>Modern Responsive Gallery with Lightbox & Filters</p>
    </header>

    <!-- FILTER BUTTONS -->
    <div class="buttons">
      <button class="active" data-name="all">All</button>
      <button data-name="nature">Nature</button>
      <button data-name="city">City</button>
      <button data-name="animals">Animals</button>
      <button data-name="tech">Tech</button>
    </div>

    <!-- GALLERY -->
    <div class="gallery">

      <div class="card nature">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card city">
        <a href="https://pexels.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card animals">
        <a href="https://pixabay.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card tech">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card nature">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card city">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card animals">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1507146426996-ef05306b995a?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card tech">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card nature">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <div class="card city">
        <a href="https://unsplash.com" target="_blank">
          <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=1200&auto=format&fit=crop">
        </a>
      </div>

      <!-- Add More Images Same Way till 20 -->

    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox">
    <span class="close">×</span>
    <img class="lightbox-img">

    <button class="prev">❮</button>
    <button class="next">❯</button>
  </div>

<script src="script.js"></script>
</body>
</html>
